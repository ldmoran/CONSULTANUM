<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villaneta 🌴 | ¿Cuál es tu Linda favorita?</title>
<style>
  :root{
    --night: #1a0b2e;
    --night2: #2d1450;
    --pink: #ff2ea6;
    --pink-soft: #ff8fd1;
    --lime: #c6ff3d;
    --sand: #ffe9c7;
    --glass: rgba(255,255,255,0.06);
  }

  *{ box-sizing:border-box; }

  @font-face{
    font-family:'system-display';
    src:local('Arial Black');
  }

  html,body{
    margin:0; padding:0; min-height:100vh;
    background:
      radial-gradient(circle at 15% 15%, rgba(255,46,166,0.25), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(198,255,61,0.15), transparent 40%),
      linear-gradient(160deg, var(--night), var(--night2) 60%, #17092b);
    color:var(--sand);
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    overflow-x:hidden;
  }

  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(2px 2px at 10% 20%, #fff8, transparent),
      radial-gradient(2px 2px at 80% 10%, #fff6, transparent),
      radial-gradient(1.5px 1.5px at 50% 60%, #fff5, transparent),
      radial-gradient(1.5px 1.5px at 90% 70%, #fff6, transparent),
      radial-gradient(2px 2px at 30% 85%, #fff5, transparent);
    background-size: 100% 100%;
    animation: twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle{ from{opacity:.5;} to{opacity:1;} }

  .wrap{
    position:relative; z-index:1;
    max-width: 620px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header{ text-align:center; margin-bottom: 40px; }

  .eyebrow{
    display:inline-block;
    font-size:13px;
    letter-spacing:.25em;
    text-transform:uppercase;
    color: var(--lime);
    border:1px solid rgba(198,255,61,0.4);
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:18px;
  }

  h1{
    font-family:'Arial Black', 'system-display', sans-serif;
    font-size: clamp(34px, 8vw, 54px);
    line-height:1;
    margin:0 0 14px;
    background: linear-gradient(100deg, var(--pink) 0%, var(--pink-soft) 45%, var(--lime) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow: 0 0 60px rgba(255,46,166,0.25);
  }

  header p{
    color: rgba(255,233,199,0.7);
    font-size:16px;
    max-width:420px;
    margin: 0 auto;
  }

  .panel{
    background: var(--glass);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  label{
    display:block;
    font-size:12px;
    letter-spacing:.15em;
    text-transform:uppercase;
    color: var(--pink-soft);
    margin-bottom:10px;
  }

  select{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    background: rgba(0,0,0,0.35);
    color: var(--sand);
    border: 2px solid rgba(255,46,166,0.4);
    border-radius: 14px;
    padding: 16px 44px 16px 18px;
    font-size: 17px;
    font-weight:600;
    cursor:pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--lime) 50%), linear-gradient(135deg, var(--lime) 50%, transparent 50%);
    background-position: calc(100% - 22px) calc(1.15em), calc(100% - 16px) calc(1.15em);
    background-size: 7px 7px, 7px 7px;
    background-repeat: no-repeat;
    transition: border-color .2s ease, transform .15s ease;
  }
  select:hover{ border-color: var(--lime); }
  select:focus{ outline:none; border-color: var(--lime); box-shadow: 0 0 0 4px rgba(198,255,61,0.15); }

  .card{
    margin-top: 26px;
    padding: 26px;
    border-radius: 20px;
    background: linear-gradient(145deg, rgba(255,46,166,0.14), rgba(198,255,61,0.06));
    border: 1px solid rgba(255,255,255,0.14);
    display:none;
    animation: pop .35s cubic-bezier(.2,1.4,.4,1) both;
  }
  .card.show{ display:block; }

  @keyframes pop{
    from{ opacity:0; transform: translateY(10px) scale(.96); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .card .tag{
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color: var(--lime);
    margin-bottom:6px;
  }

  .card h2{
    margin:0 0 4px;
    font-size: 30px;
    font-family:'Arial Black', sans-serif;
    color: var(--sand);
  }

  .card .num{
    font-size:15px;
    color: rgba(255,233,199,0.6);
    margin-bottom: 20px;
    letter-spacing:.03em;
  }

  .wa-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding: 15px 20px;
    border:none;
    border-radius: 14px;
    background: #25D366;
    color: #06210f;
    font-weight:800;
    font-size:16px;
    text-decoration:none;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 8px 24px rgba(37,211,102,0.25);
  }
  .wa-btn:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(37,211,102,0.4); }
  .wa-btn:active{ transform: translateY(0); }

  .empty-hint{
    margin-top:22px;
    text-align:center;
    font-size:14px;
    color: rgba(255,233,199,0.45);
  }

  footer{
    text-align:center;
    margin-top: 36px;
    font-size:12px;
    color: rgba(255,233,199,0.35);
    letter-spacing:.05em;
  }

  @media (prefers-reduced-motion: reduce){
    .stars{ animation:none; }
    .card{ animation:none; }
  }
</style>
</head>
<body>

<div class="stars"></div>

<div class="wrap">
  <header>
    <span class="eyebrow">Directorio Villaneta</span>
    <h1>¿Cuál es tu<br>Linda favorita?</h1>
    <p>Elige un nombre de la lista y descubre su número. Un clic te lleva directo a WhatsApp.</p>
  </header>

  <div class="panel">
    <label for="contactSelect">Elige a tu amiga de Villa</label>
    <select id="contactSelect">
      <option value="">— selecciona un nombre —</option>
    </select>

    <div class="card" id="card">
      <div class="tag">Contacto</div>
      <h2 id="cardName"></h2>
      <div class="num" id="cardNumber"></div>
      <a class="wa-btn" id="waLink" href="#" target="_blank" rel="noopener">
        💬 Abrir chat en WhatsApp
      </a>
    </div>

    <div class="empty-hint" id="hint">Aún no hay nadie seleccionado 👀</div>
  </div>

  <footer>Hecho con cariño para la villa 🌺</footer>
</div>

<script>
  // Lista de contactos: nombre real cuando se conoce, si no, Linda N
  const contacts = [
    { name: "Renata",  number: "0983483843" },
    { name: "Linda 1", number: "0987900940" },
    { name: "Linda 2", number: "0990967085" },
    { name: "Linda 3", number: "0998145933" },
    { name: "Linda 4", number: "0991286960" },
    { name: "Linda 5", number: "0989457428" },
    { name: "Linda 6", number: "0998256570" },
    { name: "Linda 7", number: "0990483921" },
    { name: "Linda 8", number: "0969088925" },
    { name: "Linda 9", number: "0988557100" },
    { name: "Linda 10", number: "0960543407" },
    { name: "Linda 11", number: "0979390941" },
    { name: "Linda 12", number: "0984783729" },
    { name: "Linda 13", number: "0998620580" }
  ];

  const select = document.getElementById('contactSelect');
  const card = document.getElementById('card');
  const cardName = document.getElementById('cardName');
  const cardNumber = document.getElementById('cardNumber');
  const waLink = document.getElementById('waLink');
  const hint = document.getElementById('hint');

  contacts.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = c.name;
    select.appendChild(opt);
  });

  function formatNumber(n){
    // 0987900940 -> +593 98 790 0940
    const digits = n.replace(/\D/g, '');
    const local = digits.startsWith('0') ? digits.slice(1) : digits;
    return `+593 ${local.slice(0,2)} ${local.slice(2,5)} ${local.slice(5,9)}`;
  }

  function toWhatsapp(n){
    const digits = n.replace(/\D/g, '');
    const local = digits.startsWith('0') ? digits.slice(1) : digits;
    return `https://wa.me/593${local}`;
  }

  select.addEventListener('change', () => {
    const val = select.value;
    if(val === ""){
      card.classList.remove('show');
      hint.style.display = 'block';
      return;
    }
    const c = contacts[val];
    cardName.textContent = c.name;
    cardNumber.textContent = formatNumber(c.number);
    waLink.href = toWhatsapp(c.number);
    card.classList.add('show');
    hint.style.display = 'none';
  });
</script>

</body>
</html>
